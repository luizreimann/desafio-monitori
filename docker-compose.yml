version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monitori-backend
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - monitori-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: monitori-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - monitori-network
    restart: unless-stopped

networks:
  monitori-network:
    driver: bridge
